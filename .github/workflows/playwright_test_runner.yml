name: Playwright runner

on:
  # This is triggered from a dispatch by the openeyes/openeyes repo
  repository_dispatch:
    types: [playwright_run*]

# Auto-cancel older in-progress workflow runs for the same PR/branch key.
concurrency:
  group: playwright-${{ github.event.client_payload.GITHUB_PULL_REQUEST || github.event.client_payload.GITHUB_HEAD_REF }}
  cancel-in-progress: true

env:
  GITHUB_REF_NAME: ${{ github.event.client_payload.GITHUB_REF_NAME }}
  GITHUB_REF: ${{ github.event.client_payload.GITHUB_REF }}
  GITHUB_HEAD_REF: ${{ github.event.client_payload.GITHUB_HEAD_REF }}
  GITHUB_BASE_REF: ${{ github.event.client_payload.GITHUB_BASE_REF }}
  GITHUB_HEAD_SHA: ${{ github.event.client_payload.GITHUB_HEAD_SHA }}
  GITHUB_BASE_SHA: ${{ github.event.client_payload.GITHUB_BASE_SHA }}
  GITHUB_PULL_REQUEST: ${{ github.event.client_payload.GITHUB_PULL_REQUEST }}
  GITHUB_REPOSITORY: ${{ github.event.client_payload.GITHUB_REPOSITORY || 'openeyes/openeyes' }}
  GITHUB_RUN_ID: ${{ github.event.client_payload.GITHUB_RUN_ID }}
  GITHUB_RUN_NUMBER: ${{ github.event.client_payload.GITHUB_RUN_NUMBER }}
  GITHUB_RUN_ATTEMPT: ${{ github.event.client_payload.GITHUB_RUN_ATTEMPT }}
  BUILD_ID: Playwright_${{ github.event.client_payload.GITHUB_REPOSITORY || 'openeyes/openeyes' }}-${{ github.event.client_payload.GITHUB_RUN_ID }}-${{ github.event.client_payload.GITHUB_RUN_ATTEMPT }}

run-name: Playwright - PR ${{ github.event.client_payload.GITHUB_PULL_REQUEST }} - Attempt ${{ github.event.client_payload.GITHUB_RUN_ATTEMPT }} - Run id ${{ github.event.client_payload.GITHUB_RUN_ID }}

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2]
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Checkout
        uses: actions/checkout@v6
        # populate commit message for merge commits
        # see https://currents.dev/readme/ci-setup/github-actions
        with:
          repository: ${{ env.GITHUB_REPOSITORY }}
          ssh-key: ${{ secrets.TKL_DEPLOY_PRIVATE_KEY }}
          ref: ${{ env.GITHUB_HEAD_REF }}

      # Check if playwright.config.ts exists and set an output
      # The rest of the steps will be skipped if it does not exist, as not all branches have playwright coverage yet
      - name: Check for Playwright config
        id: check_playwright
        run: |
          if [ -f "playwright.config.ts" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Playwright config file not found!"
            echo "Skipping Playwright tests."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      # write environment variables to a docker compose .env file
      - name: Write variables to compose .envfile
        if: steps.check_playwright.outputs.exists == 'true'
        run: |
          echo "CURRENTS_RECORD_KEY=${{ secrets.CURRENTS_RECORD_KEY }}" >> protected/tests/.env
          echo "CURRENTS_PROJECT_ID=${{ secrets.CURRENTS_PROJECT_ID }}" >> protected/tests/.env
          echo "TESTS_TO_RUN=PLAYWRIGHT_CLOUD_SHORT" >> protected/tests/.env
          echo "PUID=$(id -u)" >> protected/tests/.env
          echo "SSH_PRIVATE_KEY='${{ secrets.TKL_DEPLOY_PRIVATE_KEY }}'" >> protected/tests/.env
          echo "BUILD_BRANCH=${{ env.GITHUB_HEAD_REF }}" >> protected/tests/.env
          echo "BUILD_ID=${{ env.BUILD_ID }}" >> protected/tests/.env
          echo "OE_DEFAULT_BRANCH=${{ env.GITHUB_BASE_REF }}" >> protected/tests/.env
          echo "LOG_TO_BROWSER='error, warning, notice, info'" >> protected/tests/.env
          echo "OE_APP_LOG_LEVELS='error, warning, notice, info'" >> protected/tests/.env

      - name: Run docker
        if: steps.check_playwright.outputs.exists == 'true'
        run: |
          docker compose -f protected/tests/docker-compose.yml --env-file protected/tests/.env run --use-aliases web

      - name: Cancel Currents.dev run if workflow was cancelled
        if: cancelled()
        env:
          CURRENTS_API_KEY: ${{ secrets.CURRENTS_API_KEY }}
          CURRENTS_PROJECT_ID: ${{ secrets.CURRENTS_PROJECT_ID }}
          BUILD_ID: ${{ env.BUILD_ID }}
          CURRENT_WORKFLOW_RUN_ID: ${{ github.run_id }}
          CURRENT_WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          echo "Workflow was cancelled — cancelling Currents.dev runs for build ID: $BUILD_ID"
          echo "Currents project ID: $CURRENTS_PROJECT_ID"
          echo "Dispatch payload runId/attempt: $GITHUB_RUN_ID/$GITHUB_RUN_ATTEMPT"
          echo "Current workflow runId/attempt: $CURRENT_WORKFLOW_RUN_ID/$CURRENT_WORKFLOW_RUN_ATTEMPT"

          compact_response() {
            local response="$1"
            echo "$response" | jq -c '{status, error, data: {runId: .data.runId, status: .data.status, completionState: .data.completionState, canceledAt: (.data.cancellation.canceledAt // .data.canceledAt)}}' 2>/dev/null || echo "$response"
          }

          attempt_cancel_by_github() {
            local run_id="$1"
            local run_attempt="$2"
            local label="$3"

            local payload
            payload=$(jq -n \
              --arg githubRunId "$run_id" \
              --argjson githubRunAttempt "${run_attempt:-0}" \
              --arg projectId "$CURRENTS_PROJECT_ID" \
              --arg ciBuildId "$BUILD_ID" \
              '{
                githubRunId: $githubRunId,
                githubRunAttempt: $githubRunAttempt,
                projectId: $projectId,
                ciBuildId: $ciBuildId
              }')

            echo "Attempting cancel by $label GitHub metadata (runId=$run_id, attempt=$run_attempt)..."

            local response
            response=$(curl -s -X PUT \
              -H "Authorization: Bearer $CURRENTS_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$payload" \
              "https://api.currents.dev/v1/runs/cancel-ci/github")

            echo "Cancel-by-GitHub ($label) response: $(compact_response "$response")"

            if echo "$response" | jq -e '.status == "OK"' > /dev/null 2>&1; then
              local cancelled_run_id
              cancelled_run_id=$(echo "$response" | jq -r '.data.runId // "unknown"')
              echo "Successfully cancelled run via $label GitHub metadata. Run ID: $cancelled_run_id"
              return 0
            fi

            return 1
          }

          # First attempt: cancel directly by dispatch payload GitHub metadata.
          if attempt_cancel_by_github "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" "dispatch payload"; then
            exit 0
          fi

          # Second attempt: use this workflow's GitHub metadata only if it differs.
          if [[ "$CURRENT_WORKFLOW_RUN_ID" != "$GITHUB_RUN_ID" || "$CURRENT_WORKFLOW_RUN_ATTEMPT" != "$GITHUB_RUN_ATTEMPT" ]]; then
            if attempt_cancel_by_github "$CURRENT_WORKFLOW_RUN_ID" "$CURRENT_WORKFLOW_RUN_ATTEMPT" "current workflow"; then
              exit 0
            fi
          else
            echo "Skipping second GitHub metadata cancel attempt because IDs and attempts are identical."
          fi

          echo "Cancel-by-GitHub attempts failed or did not find a run. Falling back to /runs/find by projectId + ciBuildId..."

          # Fallback: locate run by project + build ID, then cancel by run ID.
          ENCODED_BUILD_ID=$(jq -rn --arg value "$BUILD_ID" '$value|@uri')
          ENCODED_PROJECT_ID=$(jq -rn --arg value "$CURRENTS_PROJECT_ID" '$value|@uri')
          RUN=$(curl -s \
            -H "Authorization: Bearer $CURRENTS_API_KEY" \
            "https://api.currents.dev/v1/runs/find?projectId=$ENCODED_PROJECT_ID&ciBuildId=$ENCODED_BUILD_ID")

          echo "Runs find response: $(compact_response "$RUN")"
          if ! echo "$RUN" | jq -e . > /dev/null 2>&1; then
            echo "Currents.dev API returned non-JSON response. Skipping cancellation."
            exit 0
          fi

          if ! echo "$RUN" | jq -e '.status == "OK" and (.data.runId | type == "string")' > /dev/null 2>&1; then
            echo "No run found via /runs/find. Nothing to cancel."
            exit 0
          fi

          RUN_ID=$(echo "$RUN" | jq -r '.data.runId')
          RUN_STATUS=$(echo "$RUN" | jq -r '.data.status // "unknown"')
          RUN_COMPLETION_STATE=$(echo "$RUN" | jq -r '.data.completionState // "unknown"')
          RUN_CANCELLED_AT=$(echo "$RUN" | jq -r '.data.cancellation.canceledAt // empty')

          if [[ "$RUN_COMPLETION_STATE" == "CANCELED" || "$RUN_COMPLETION_STATE" == "CANCELLED" || "$RUN_STATUS" == "CANCELED" || "$RUN_STATUS" == "CANCELLED" || -n "$RUN_CANCELLED_AT" ]]; then
            echo "Run already cancelled ($RUN_ID, status=$RUN_STATUS, completionState=$RUN_COMPLETION_STATE)."
            exit 0
          fi

          echo "Cancelling run from /runs/find: $RUN_ID (status=$RUN_STATUS, completionState=$RUN_COMPLETION_STATE)"

          CANCEL_RESPONSE=$(curl -s -X PUT \
            -H "Authorization: Bearer $CURRENTS_API_KEY" \
            "https://api.currents.dev/v1/runs/$RUN_ID/cancel")

          echo "Cancel response for $RUN_ID: $(compact_response "$CANCEL_RESPONSE")"

          if echo "$CANCEL_RESPONSE" | jq -e '.status == "OK"' > /dev/null 2>&1; then
            echo "Run $RUN_ID cancelled successfully."
            exit 0
          fi

          if echo "$CANCEL_RESPONSE" | jq -e '((.error | type == "string") and (.error | test("Run is cancelled"; "i"))) or ((.error | type == "array") and any(.error[]; test("Run is cancelled"; "i")))' > /dev/null 2>&1; then
            echo "Run $RUN_ID was already cancelled."
            exit 0
          fi

          echo "Could not cancel run $RUN_ID."
          exit 0